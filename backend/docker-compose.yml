version: "3.9"

services:
  vidhi-ai:
    build: .
    container_name: vidhi-ai
    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./storage:/app/storage
      - ./vidhi_ai.db:/app/vidhi_ai.db

    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      "

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
