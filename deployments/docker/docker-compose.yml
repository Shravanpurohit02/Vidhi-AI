version: "3.9"

services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: vidhi-api
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - vidhi-network

  postgres:
    image: postgres:16
    container_name: vidhi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vidhi_ai
      POSTGRES_USER: vidhi
      POSTGRES_PASSWORD: change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - vidhi-network

  redis:
    image: redis:7
    container_name: vidhi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - vidhi-network

  minio:
    image: minio/minio
    container_name: vidhi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - vidhi-network

  nginx:
    image: nginx:stable
    container_name: vidhi-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - vidhi-network

  prometheus:
    image: prom/prometheus:latest
    container_name: vidhi-prometheus
    restart: unless-stopped
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - vidhi-network

  grafana:
    image: grafana/grafana:latest
    container_name: vidhi-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - vidhi-network

volumes:
  postgres_data:
  minio_data:
  grafana_data:

networks:
  vidhi-network:
    driver: bridge
